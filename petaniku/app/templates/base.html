<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PetaniKu{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --accent: #f59e0b;
            --accent-light: #fcd34d;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        h1, h2, h3, .font-black {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
        }

        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            font-size: 18px;
        }

        .btn-besar {
            @apply px-6 py-3 rounded-xl font-bold text-lg transition-all duration-300;
            @apply border-2 border-transparent;
        }

        .btn-hijau {
            @apply bg-gradient-to-r from-teal-600 to-emerald-600 text-white;
            @apply shadow-lg hover:shadow-xl hover:scale-105;
        }

        .btn-amber {
            @apply bg-gradient-to-r from-amber-500 to-orange-500 text-white;
            @apply shadow-lg hover:shadow-xl hover:scale-105;
        }

        .kartu {
            @apply bg-white rounded-2xl p-6 shadow-md border border-teal-100;
            @apply transition-all duration-300 hover:shadow-lg;
        }

        .kartu:hover {
            @apply border-teal-300;
        }

        .card-gradient {
            @apply bg-gradient-to-br from-blue-50 to-cyan-50 rounded-2xl p-6;
            @apply border border-blue-200 shadow-md;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            @apply w-full px-4 py-3 rounded-xl border-2 border-teal-100;
            @apply focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-200;
            @apply transition-all duration-300 text-lg;
        }

        label {
            @apply block font-semibold text-gray-800 mb-3 text-lg;
        }

        .nav-bottom {
            @apply fixed bottom-0 left-0 right-0 bg-white border-t-2 border-teal-100;
            @apply backdrop-blur-md bg-opacity-95 z-50;
        }

        nav a {
            @apply flex flex-col items-center gap-2 py-4 px-6 text-center;
            @apply text-gray-600 transition-all duration-300 flex-1;
        }

        nav a.active {
            @apply text-teal-700 font-bold;
        }
    </style>
</head>
<body>
    <div class="pb-24">
        {% block content %}{% endblock %}
    </div>

    <!-- Navigation Bottom -->
    <nav class="nav-bottom flex justify-around">
        <a href="{{ url_for('main.dashboard') }}" class="active">
            <span class="text-2xl">🏠</span>
            <span class="text-xs font-bold">Beranda</span>
        </a>
        <a href="{{ url_for('main.catat_kegiatan') }}">
            <span class="text-2xl">✍️</span>
            <span class="text-xs font-bold">Catat</span>
        </a>
        <a href="{{ url_for('main.riwayat_kegiatan') }}">
            <span class="text-2xl">📋</span>
            <span class="text-xs font-bold">Riwayat</span>
        </a>
        <a href="{{ url_for('main.kelola_jadwal') }}">
            <span class="text-2xl">📅</span>
            <span class="text-xs font-bold">Jadwal</span>
        </a>
        <a href="{{ url_for('main.kelola_eksperimen') }}">
            <span class="text-2xl">🧪</span>
            <span class="text-xs font-bold">Eksperimen</span>
        </a>
    </nav>
</body>
</html>
